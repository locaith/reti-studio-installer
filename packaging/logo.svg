<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff4657"/>
      <stop offset="1" stop-color="#ff7a3d"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- tile -->
  <rect x="26" y="26" width="460" height="460" rx="116" fill="url(#tile)"/>
  <rect x="26" y="26" width="460" height="460" rx="116" fill="url(#sheen)"/>
  <rect x="26.5" y="26.5" width="459" height="459" rx="115.5" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1"/>

  <!-- play mark (rounded triangle) -->
  <g filter="url(#soft)">
    <path d="M212 176
             a26 26 0 0 1 39 -22
             l118 74
             a26 26 0 0 1 0 44
             l-118 74
             a26 26 0 0 1 -39 -22
             z"
          fill="#ffffff"/>
  </g>

  <!-- AI spark -->
  <path d="M372 132
           c4 22 10 28 32 32 -22 4 -28 10 -32 32 -4 -22 -10 -28 -32 -32 22 -4 28 -10 32 -32 z"
        fill="#ffffff" opacity="0.96"/>
</svg>
