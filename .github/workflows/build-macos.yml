name: Build macOS app

on:
  workflow_dispatch:
  push:
    paths:
      - 'client/**'
      - 'client_launcher.py'
      - 'requirements-client.txt'
      - 'packaging/**'
      - '.github/workflows/build-macos.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-client.txt
          pip install pyinstaller

      - name: Make app icon (.icns)
        run: |
          mkdir -p icon.iconset
          sips -z 16 16     packaging/logo1024.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     packaging/logo1024.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     packaging/logo1024.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     packaging/logo1024.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   packaging/logo1024.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   packaging/logo1024.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   packaging/logo1024.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   packaging/logo1024.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   packaging/logo1024.png --out icon.iconset/icon_512x512.png
          cp packaging/logo1024.png icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o packaging/app.icns

      - name: Build .app
        run: pyinstaller packaging/reti_client_mac.spec --noconfirm --clean

      - name: Package .dmg
        run: |
          cd dist
          hdiutil create -volname "RETI Studio" -srcfolder "RETI Studio.app" -ov -format UDZO "RETI-Studio-1.6.3.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RETI-Studio-macOS-dmg
          path: dist/RETI-Studio-1.6.3.dmg

      - name: Publish to release v1.6.3
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.6.3
          name: RETI Studio 1.6.3
          files: dist/RETI-Studio-1.6.3.dmg
          body: |
            Bản 1.6.3 — SỬA LỖI kết nối: một số máy (nhất là vừa khởi động lại) mở app báo
            "Không kết nối được máy chủ / NO_CERTIFICATE_OR_CRL_FOUND". Nguyên nhân do app
            thiếu bộ chứng chỉ SSL khi đóng gói → nay nhúng sẵn chứng chỉ vào app, không còn
            phụ thuộc kho chứng chỉ của Windows, kết nối ổn định ngay cả lúc máy mới bật.
            macOS (.dmg) chưa ký số: mở lần đầu chuột phải > Open, hoặc
            `xattr -dr com.apple.quarantine "/Applications/RETI Studio.app"`
