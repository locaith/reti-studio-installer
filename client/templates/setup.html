<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RETI Studio — Kích hoạt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <div class="setup-wrap">
      <div class="setup-card">
        <div class="brand" style="justify-content:center;margin-bottom:6px">
          <span class="brand-mark">
            <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bm2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff4657"/><stop offset="1" stop-color="#ff7a3d"/></linearGradient></defs><rect x="26" y="26" width="460" height="460" rx="116" fill="url(#bm2)"/><path d="M212 176 a26 26 0 0 1 39 -22 l118 74 a26 26 0 0 1 0 44 l-118 74 a26 26 0 0 1 -39 -22 z" fill="#fff"/><path d="M372 132 c4 22 10 28 32 32 -22 4 -28 10 -32 32 -4 -22 -10 -28 -32 -32 22 -4 28 -10 32 -32 z" fill="#fff" opacity="0.96"/></svg>
          </span>
          <span class="brand-text">RETI <em>Studio</em></span>
        </div>
        <h1>Kích hoạt ứng dụng</h1>
        <p class="lede" style="text-align:center;margin:0 0 20px">Nhập mã kích hoạt được cấp để bắt đầu tạo video AI.</p>
        {% if error %}<div class="alert">{{ error }}</div>{% endif %}
        <form action="/setup" method="post" class="setup-form">
          <label class="field">
            <span>Mã kích hoạt</span>
            <input name="token" type="text" autocomplete="off" required placeholder="Dán mã kích hoạt của bạn">
          </label>
          <button class="primary-btn" type="submit" style="width:100%;height:46px">Kích hoạt</button>
        </form>
        <p class="setup-note">Chưa có mã? Liên hệ RETI để được cấp quyền sử dụng.</p>
      </div>
    </div>
  </body>
</html>
