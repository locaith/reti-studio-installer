<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RETI Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <a class="brand" href="/">
          <span class="brand-mark">R</span>
          <span class="brand-text">RETI <em>Studio</em></span>
        </a>
        <a class="new-btn" href="/">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          Tạo video mới
        </a>
        <nav class="nav">
          <a href="/" class="nav-item active">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="m10 8 5 3-5 3z" fill="currentColor" stroke="none"/></svg>
            Video của tôi
          </a>
        </nav>
        <div class="sidebar-foot">
          {% block foot %}{% endblock %}
          <form action="/logout" method="post" style="margin:0">
            <button class="nav-item subtle" type="submit" style="width:100%;background:none;border:0;cursor:pointer;text-align:left">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
              Đăng xuất
            </button>
          </form>
        </div>
      </aside>
      <main class="content">{% block content %}{% endblock %}</main>
    </div>
    <script>
      for (const card of document.querySelectorAll(".video-card")) {
        const v = card.querySelector("video.thumb-video");
        if (!v) continue;
        card.addEventListener("mouseenter", () => { try { v.currentTime = 0; v.play(); } catch (e) {} });
        card.addEventListener("mouseleave", () => { try { v.pause(); v.currentTime = 0; } catch (e) {} });
      }
    </script>
    {% block scripts %}{% endblock %}
  </body>
</html>
