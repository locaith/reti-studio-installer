<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RETI Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <a class="brand" href="/">
          <span class="brand-mark">
            <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bm" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff4657"/><stop offset="1" stop-color="#ff7a3d"/></linearGradient></defs><rect x="26" y="26" width="460" height="460" rx="116" fill="url(#bm)"/><path d="M212 176 a26 26 0 0 1 39 -22 l118 74 a26 26 0 0 1 0 44 l-118 74 a26 26 0 0 1 -39 -22 z" fill="#fff"/><path d="M372 132 c4 22 10 28 32 32 -22 4 -28 10 -32 32 -4 -22 -10 -28 -32 -32 22 -4 28 -10 32 -32 z" fill="#fff" opacity="0.96"/></svg>
          </span>
          <span class="brand-text">RETI <em>Studio</em></span>
        </a>
        <a class="new-btn" href="/">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          Tạo video mới
        </a>
        <nav class="nav">
          <a href="/" class="nav-item active">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="m10 8 5 3-5 3z" fill="currentColor" stroke="none"/></svg>
            Video của tôi
          </a>
          <a href="/settings" class="nav-item">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            Cài đặt
          </a>
        </nav>
        <div class="sidebar-foot">
          {% block foot %}{% endblock %}
          <form action="/logout" method="post" style="margin:0">
            <button class="nav-item subtle" type="submit" style="width:100%;background:none;border:0;cursor:pointer;text-align:left">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
              Đăng xuất
            </button>
          </form>
        </div>
      </aside>
      <main class="content">
        <a id="update-banner" class="update-banner hidden" href="#">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0 4-4m-4 4-4-4"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
          <span class="ut">Có bản cập nhật mới <strong class="uv"></strong> — bấm để cập nhật.</span>
          <span class="update-cta">Cập nhật →</span>
        </a>
        {% block content %}{% endblock %}
      </main>
    </div>
    <script>
      for (const card of document.querySelectorAll(".video-card")) {
        const v = card.querySelector("video.thumb-video");
        if (!v) continue;
        card.addEventListener("mouseenter", () => { try { v.currentTime = 0; v.play(); } catch (e) {} });
        card.addEventListener("mouseleave", () => { try { v.pause(); v.currentTime = 0; } catch (e) {} });
      }
    </script>
    <script>
      // Auto-update: check GitHub for a newer installer; offer one-click update.
      (async () => {
        try {
          const u = await (await fetch("/api/update-check")).json();
          const b = document.getElementById("update-banner");
          if (u && u.available && u.url && b) {
            b.querySelector(".uv").textContent = "v" + u.latest;
            b.dataset.url = u.url;
            b.classList.remove("hidden");
          }
        } catch (e) {}
      })();
      document.getElementById("update-banner")?.addEventListener("click", async (e) => {
        e.preventDefault();
        const b = e.currentTarget;
        const ut = b.querySelector(".ut");
        if (!b.dataset.url) { ut.textContent = "Bạn đang dùng bản mới nhất."; return; }
        ut.textContent = "Đang tải bản cập nhật…";
        try {
          const fd = new FormData();
          fd.append("url", b.dataset.url);
          const r = await fetch("/do-update", { method: "POST", body: fd });
          ut.textContent = r.ok
            ? "Đang mở bộ cài — làm theo hướng dẫn để hoàn tất cập nhật."
            : "Cập nhật thất bại, vui lòng thử lại sau.";
        } catch (err) {
          ut.textContent = "Cập nhật thất bại.";
        }
      });
    </script>
    {% block scripts %}{% endblock %}
  </body>
</html>
